
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SatyaKavach — Verified Intelligence</title>
    <meta name="description" content="Cross-reference claims against global news nodes using deep-grounded neural analysis. Premium verified intelligence platform." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              charcoal: '#020203',
              surface: '#0A0A0B',
            }
          }
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        background-color: #020203;
        color: #FFFFFF;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        margin: 0;
        font-family: 'Inter', sans-serif;
      }

      /* --- Enhanced Glassmorphism --- */
      .glass {
        background: rgba(255, 255, 255, 0.025);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 0.5px rgba(255,255,255,0.05);
      }

      .glass-strong {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(60px);
        -webkit-backdrop-filter: blur(60px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), inset 0 0 0 0.5px rgba(255,255,255,0.06);
      }

      .gradient-text {
        background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .gradient-text-brand {
        background: linear-gradient(135deg, #818cf8 0%, #06b6d4 50%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* --- Auth Split-Screen --- */
      .auth-split-left {
        background: linear-gradient(135deg, #0f0a2e 0%, #0c1445 30%, #041630 60%, #020203 100%);
        position: relative;
        overflow: hidden;
      }
      .auth-split-left::before {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
        top: 20%;
        left: -10%;
        animation: float 8s ease-in-out infinite;
      }
      .auth-split-left::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
        bottom: 10%;
        right: -10%;
        animation: float-delayed 10s ease-in-out infinite;
      }

      /* --- Keyframe Animations --- */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes float-delayed {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.15), 0 0 40px rgba(99, 102, 241, 0.05); }
        50% { box-shadow: 0 0 25px rgba(6, 182, 212, 0.2), 0 0 60px rgba(99, 102, 241, 0.1); }
      }
      @keyframes particle-drift {
        0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-120vh) translateX(20px) scale(0.3); opacity: 0; }
      }
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes scan-line {
        0% { transform: translateX(-100%); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateX(100%); opacity: 0; }
      }
      @keyframes ring-scale {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.15); opacity: 0.2; }
      }
      @keyframes core-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(99,102,241,0.4); }
        50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(99,102,241,0.6), 0 0 80px rgba(6,182,212,0.2); }
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes gradient-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes pulse-subtle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      /* --- Floating Card Utility --- */
      .float-card {
        animation: float 6s ease-in-out infinite;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
      }
      .float-card:hover {
        transform: translateY(-12px) scale(1.015);
        box-shadow: 0 20px 60px rgba(99, 102, 241, 0.1), 0 8px 24px rgba(0,0,0,0.4);
      }
      .float-card-delayed {
        animation: float-delayed 7s ease-in-out infinite;
        animation-delay: 1s;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
      }
      .float-card-delayed:hover {
        transform: translateY(-10px) scale(1.01);
        box-shadow: 0 16px 50px rgba(99, 102, 241, 0.08), 0 6px 20px rgba(0,0,0,0.3);
      }

      /* --- Glow Border Utility --- */
      .glow-border {
        animation: glow-pulse 4s ease-in-out infinite;
      }

      /* --- Particle Dot --- */
      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(99, 102, 241, 0.6);
        border-radius: 50%;
        animation: particle-drift linear infinite;
        pointer-events: none;
      }

      /* --- Analyzing Overlay Styles --- */
      .orbit-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(99, 102, 241, 0.15);
        animation: orbit linear infinite;
      }
      .orbit-ring-reverse {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(6, 182, 212, 0.1);
        animation: orbit linear infinite reverse;
      }
      .pulse-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(99, 102, 241, 0.1);
        animation: ring-scale 3s ease-in-out infinite;
      }
      .core-glow {
        animation: core-pulse 2s ease-in-out infinite;
        border-radius: 50%;
      }
      .scan-sweep {
        animation: scan-line 2.5s ease-in-out infinite;
      }

      /* --- Nav active indicator --- */
      .nav-active-indicator {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 60%;
        background: linear-gradient(180deg, #818cf8, #06b6d4);
        border-radius: 0 4px 4px 0;
      }

      /* --- Scrollbar --- */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* --- Risk badge --- */
      .risk-badge-low { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
      .risk-badge-medium { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
      .risk-badge-high { background: rgba(244, 63, 94, 0.1); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.2); }

      /* --- Table hover glow --- */
      .table-row-hover {
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }
      .table-row-hover:hover {
        background: rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 0 30px rgba(99, 102, 241, 0.02);
      }

      /* --- Smooth focus ring --- */
      .focus-ring {
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }
      .focus-ring:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        border-color: rgba(99, 102, 241, 0.4);
      }
    </style>

{

  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
